idiom_understanding:
  metadata:
    version: 1
  name: idiom_understanding
  competency: nlu
  metric_file: src/metrics/f1_acc_metric.py
  metric_class: F1AccMetric
  metric: normalized_accuracy
  fewshot_num_examples:
    instruct: 0
    base: 5
  languages:
    zh:
      filepath: seahelm_tasks/nlu/idiom/data/ChID_test_data_SEAHELM.jsonl
      example_filepath: seahelm_tasks/nlu/idiom/data/ChID_example.jsonl
      max_tokens: 32
      prompt_template:
        preamble: |-
          选择最适合标有 #idiom# 位置的成语。

          请使用以下格式提供答案：
          "{answer_tag}ANSWER"
          其中，ANSWER 是与最佳成语对应的字母。请仅使用字母 A、B、C、D、E、F 或 G 作答。
        task_template: |-
          文本：
          ```
          {text}
          ```
          A：{choice_a}
          B：{choice_b}
          C：{choice_c}
          D：{choice_d}
          E：{choice_e}
          F：{choice_f}
          G：{choice_g}
        answer_template: |-
          {answer_tag}{label}
        answer_tag: "答案："
